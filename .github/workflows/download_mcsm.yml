name: Download and Release MCSManager ARMv7l

on:
  schedule:
    - cron: '0 18 * * *'  # 北京时间 02:00
  workflow_dispatch:     # 手动触发

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq gh

      # 强制清理旧文件，避免冲突
      - name: Clean old files
        run: rm -rf mcsmanager/

      # ✅ 你提供的官方最新版链接（正确！）
      - name: Download official latest MCSManager
        run: |
          echo "📥 下载官方最新版..."
          wget -O mcsmanager_linux.tar.gz https://github.com/MCSManager/MCSManager/releases/latest/download/mcsmanager_linux_release.tar.gz

      # 解压
      - name: Extract package
        run: |
          echo "📂 解压中..."
          tar -zxf mcsmanager_linux.tar.gz

      # 读取版本（现在一定是 10.12.4）
      - name: Get official version
        id: get_version
        run: |
          VERSION=$(jq -r '.version' mcsmanager/daemon/package.json)
          echo "✅ 官方最新版本: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # 检查 Release 是否已存在
      - name: Check if release exists
        id: check_release
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ $TAG 已存在，跳过构建"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🔨 $TAG 不存在，开始构建"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 构建 ARMv7l 版本
      - name: Build ARM version
        if: steps.check_release.outputs.exists == 'false'
        run: |
          rm -f mcsmanager_linux.tar.gz

          # 复制 ARM 依赖库
          mkdir -p mcsmanager/daemon/lib
          cp lib/file_zip_linux_arm mcsmanager/daemon/lib/
          cp lib/pty_linux_arm mcsmanager/daemon/lib/

          # 修改内存参数
          sed -i 's/--max-old-space-size=8192/--max-old-space-size=1024/g' mcsmanager/start-daemon.sh
          sed -i 's/--max-old-space-size=8192/--max-old-space-size=1024/g' mcsmanager/start-web.sh

          # 打包
          tar -czf mcsmanager_armv7l_release.tar.gz mcsmanager

      # 创建 Release 并上传
      - name: Create release and upload
        if: steps.check_release.outputs.exists == 'false'
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          gh release create "$TAG" \
            --title "MCSManager ARMv7l $TAG" \
            --notes "自动构建 • 适配 ARMv7l • 基于官方最新版" \
            --draft=false --prerelease=false
          gh release upload "$TAG" mcsmanager_armv7l_release.tar.gz --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 提交变更
      - name: Commit and push
        if: steps.check_release.outputs.exists == 'false'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto update: MCSManager ${{ steps.get_version.outputs.version }}"
          git push
